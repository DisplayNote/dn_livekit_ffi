language = "C++"
include_guard = "livekit_ffi"
autogen_warning = "/* Warning, this file is autogenerated. Don't modify this manually. */"
usize_is_size_t = true

# Exclude Android/JNI specific modules and functions
[parse]
parse_deps = false
clean = false
exclude = ["android", "JNI_OnLoad", "JavaVM", "jint", "JNI_VERSION_1_6"]

# Only include explicitly marked items for export
[parse.expand]
all_features = false
default_features = false
